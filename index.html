<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    padding-bottom: 80px;
}

/* HEADER */
header {
    background: linear-gradient(to right, #000000, #1a1a1a);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 45px;
}

.logo-text span {
    color: gold;
}

nav a {
    color: white;
    margin-left: 25px;
    text-decoration: none;
}

/* HERO */
.hero {
    height: 90vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('hero3.jpg');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-size: 48px;
    max-width: 700px;
}

.hero p {
    font-size: 18px;
    margin: 15px 0;
}

.btn {
    background: #25D366;
    padding: 12px 25px;
    color: white;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
}

/* TRUST */
.trust {
    background: #f8f8f8;
    padding: 40px;
    text-align: center;
}

.trust-box {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
}

/* SERVICES */
.services {
    padding: 60px;
    text-align: center;
    background: #d9e6f2;
}

.service-box {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 220px;
    border-radius: 12px;
    overflow: hidden;
    background: white;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card a {
    display: block;
    padding: 10px;
    color: green;
    text-decoration: none;
}

/* ABOUT */
.about {
    padding: 70px;
    background: linear-gradient(to right, #fdfcfb, #e2d1c3);
    text-align: center;
}

.about-box {
    display: flex;
    gap: 50px;
    flex-wrap: wrap;
    justify-content: center;
}

.about-text {
    max-width: 520px;
    text-align: left;
    line-height: 1.7;
}

.about-img img {
    width: 350px;
    border-radius: 15px;
}

/* WORK */
.work {
    padding: 60px 20px;
    text-align: center;
    background: #f5f1e8;
}

.work-box {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.work-box img {
    width: 300px;
    height: 200px;
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
}

/* BEFORE AFTER */
.before-after {
    padding: 60px;
    text-align: center;
    background: #f5f1e8;
}

.ba-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.ba-container img {
    width: 300px;
    border-radius: 15px;
}

/* TESTIMONIAL */
.testimonials {
    padding: 50px;
    text-align: center;
}

.testimonial-box {
    background: white;
    padding: 20px;
    margin: 15px auto;
    max-width: 400px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* FOOTER */
footer {
    background: black;
    color: white;
    text-align: center;
    padding: 40px;
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
}

/* WHATSAPP */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.whatsapp-float a {
    background: #25D366;
    color: white;
    font-size: 30px;
    padding: 18px 22px;
    border-radius: 50%;
}
</style>

</head>

<body>

<header>
    <div class="logo">
        <img src="logo1.png">
        <div class="logo-text">Point<span>Craft</span> Interiors</div>
    </div>
</header>

<section class="hero">
    <div>
        <h1>Transform Your Home with Expert Interior Design</h1>
        <p>Affordable | Modern | Customized Interiors</p>
        <a href="https://wa.me/919953251355?text=Hi%20I%20want%20interior%20design" class="btn">Get Free Consultation</a>
    </div>
</section>

<section class="work">
    <h2>Our Work</h2>
    <div class="work-box">
        <img src="Kitchen2.jpg" onclick="openImage(this.src)">
        <img src="Wardrobe2.jpg" onclick="openImage(this.src)">
        <img src="Interiors.jpg" onclick="openImage(this.src)">
    </div>
</section>

<footer>
    <p>pointcraftinteriors@gmail.com</p>
    <p>+91 9953251355</p>
</footer>

<div id="lightbox" onclick="closeImage()">
    <img id="lightbox-img">
</div>

<div class="whatsapp-float">
  <a href="https://wa.me/919953251355">💬</a>
</div>

<script>
function openImage(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}
function closeImage() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
