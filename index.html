<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#f8f6f3;
color:#333;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.hero{
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
height:80vh;
display:flex;
align-items:center;
padding:40px;
color:#000;
}

.hero h1{
font-size:40px;
max-width:500px;
}

.btn{
padding:10px 20px;
margin-right:10px;
border:none;
background:#c89b3c;
color:white;
cursor:pointer;
}

.section{
padding:50px;
text-align:center;
}

.services{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.before-after{
display:flex;
gap:20px;
justify-content:center;
}

.before-after img{
width:45%;
border-radius:10px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
}
</style>

</head>

<body>

<header>
<h2>PointCraft Interiors</h2>
</header>

<section class="hero">
<div>
<h1>Transform Your Space with PointCraft Interiors</h1>
<button class="btn">Call Now</button>
<button class="btn">WhatsApp</button>
</div>
</section>

<section class="section">
<h2>Our Services</h2>
<div class="services">
<div class="card">Modular Kitchen</div>
<div class="card">Wardrobe</div>
<div class="card">Full Interior</div>
<div class="card">Steel Work</div>
</div>
</section>

<section class="section">
<h2>Before & After</h2>
<div class="before-after">
<img src="https://images.unsplash.com/photo-1556911220-bff31c812dba">
<img src="https://images.unsplash.com/photo-1600566752355-35792bedcfea">
</div>
</section>

<footer>
<p>© 2026 PointCraft Interiors</p>
</footer>

</body>
</html>
