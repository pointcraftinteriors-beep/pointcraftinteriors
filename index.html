<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:white;
}

nav ul {
  display:flex;
  gap:20px;
  list-style:none;
}

.section {
  padding:50px;
  text-align:center;
}

.cards {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card {
  width:220px;
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card p {
  padding:10px;
  font-weight:bold;
}

.gallery {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.gallery img {
  width:300px;
  border-radius:10px;
}
</style>
</head>

<body>

<nav>
  <h2>PointCraft Interiors</h2>
  <ul>
    <li>Home</li>
    <li>Services</li>
    <li>Gallery</li>
  </ul>
</nav>

<div class="section">
<h2>Our Services</h2>

<div class="cards">

<div class="card">
<img src="Modular kitchen.jpg">
<p>Modular Kitchen</p>
</div>

<div class="card">
<img src="Wardrobe.jpg">
<p>Wardrobe</p>
</div>

<div class="card">
<img src="Full Interiors.jpg">
<p>Full Interior</p>
</div>

<div class="card">
<img src="Steel railing.jpg">
<p>Steel Work</p>
</div>

</div>
</div>

<div class="section">
<h2>Our Work</h2>

<div class="gallery">

<img src="Kitchen.png">
<img src="Interior.png">
<img src="Wardrobe2.png">

</div>

</div>

</body>
</html>
