<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background: linear-gradient(to right, #000000, #1a1a1a);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 45px;
}

.logo-text {
    font-size: 20px;
    font-weight: bold;
}

.logo-text span {
    color: gold;
}

nav a {
    color: white;
    margin-left: 25px;
    text-decoration: none;
}

/* HERO */
.hero {
    height: 80vh;
    background: url('Hero.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero h1 {
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 15px 30px;
    border-radius: 10px;
}

/* SERVICES */
.services {
    padding: 60px;
    text-align: center;
    background: #d9e6f2;
}

.service-box {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 220px;
    border-radius: 12px;
    overflow: hidden;
    background: white;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

/* OUR WORK */
.work {
    padding: 60px;
    text-align: center;
    background: #fff6cc;
}

.work-box {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.work img {
    width: 300px;
    border-radius: 15px;
}

/* BEFORE AFTER (🔥 FIXED BG) */
.before-after {
    padding: 60px;
    text-align: center;
    background: #f3f7ff; /* 🔥 SOFT LIGHT BLUE */
}

.ba-container {
    display: flex;
    justify-content: center;
    gap: 40px;
}

.ba-container img {
    width: 300px;
    border-radius: 12px;
}

/* FOOTER */
footer {
    background: black;
    color: white;
    text-align: center;
    padding: 30px;
}
</style>

</head>

<body>

<header>
    <div class="logo">
        <img src="logo1.png">
        <div class="logo-text">
            Point<span>Craft</span> Interiors
        </div>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Design Your Dream Space</h1>
</section>

<section class="services">
    <h2>Our Services</h2>

    <div class="service-box">
        <div class="card">
            <img src="Kitchen.jpg">
            <p>Modular Kitchen</p>
        </div>

        <div class="card">
            <img src="Wardrobe.jpg">
            <p>Wardrobe</p>
        </div>

        <div class="card">
            <img src="Interior.jpg">
            <p>Full Interior</p>
        </div>

        <div class="card">
            <img src="Railing.jpg">
            <p>Steel Work</p>
        </div>
    </div>
</section>

<section class="work">
    <h2>Our Work</h2>

    <div class="work-box">
        <img src="Kitchen2.jpg">
        <img src="Wardrobe2.jpg">
        <img src="Interiors.jpg">
    </div>
</section>

<section class="before-after">
    <h2>Before & After</h2>

    <div class="ba-container">
        <div>
            <p>Before</p>
            <img src="Before.png">
        </div>

        <div>
            <p>After</p>
            <img src="After.png">
        </div>
    </div>
</section>

<footer>
    © 2026 PointCraft Interiors
</footer>

</body>
</html>
