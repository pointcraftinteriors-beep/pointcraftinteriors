<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background: #000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 40px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo img {
    height: 55px;
}

.logo-text h1 {
    margin: 0;
    color: #fff;
    font-size: 20px;
}

.logo-text span {
    color: gold;
}

.logo-text p {
    margin: 0;
    font-size: 12px;
    color: #ccc;
}

nav a {
    color: #fff;
    text-decoration: none;
    margin-left: 25px;
}

/* HERO */
.hero {
    height: 420px;
    background: url("Hero.jpg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
}

.hero h2 {
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 15px 30px;
    border-radius: 10px;
}

/* SERVICES */
.services {
    background: #e6f4ff;
    padding: 50px;
    text-align: center;
}

.cards {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.card img {
    width: 220px;
    border-radius: 10px;
}

/* OUR WORK */
.work {
    padding: 50px;
    text-align: center;
    background: #f5f5f5;
}

.work img {
    width: 280px;
    margin: 10px;
    border-radius: 10px;
}

/* BEFORE AFTER */
.before-after {
    padding: 50px;
    text-align: center;
}

.before-after img {
    width: 300px;
    margin: 10px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #000;
    color: #fff;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo1.png">
        <div class="logo-text">
            <h1>Point<span>Craft</span> Interiors</h1>
            <p>📞 9953251355 | ✉ pointcraftinteriors@gmail.com</p>
        </div>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Design Your Dream Space</h2>
</section>

<section class="services">
    <h2>Our Services</h2>

    <div class="cards">
        <div class="card"><img src="Kitchen.jpg"></div>
        <div class="card"><img src="Wardrobe.jpg"></div>
        <div class="card"><img src="Interior.jpg"></div>
        <div class="card"><img src="Railing.jpg"></div>
    </div>
</section>

<section class="work">
    <h2>Our Work</h2>
    <img src="Kitchen2.jpg">
    <img src="Wardrobe2.jpg">
    <img src="Interiors.jpg">
</section>

<section class="before-after">
    <h2>Before & After</h2>
    <img src="Kitchen.jpg">
    <img src="Kitchen2.jpg">
</section>

<footer>
    © 2026 PointCraft Interiors | All Rights Reserved
</footer>

</body>
</html>
