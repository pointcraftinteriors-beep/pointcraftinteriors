<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body { margin:0; font-family:Arial; }

/* HEADER */
header {
background:black;color:white;
display:flex;justify-content:space-between;
padding:15px 40px;
}

nav a { color:white; margin-left:20px; text-decoration:none; }

/* HERO */
.hero {
height:90vh;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1 { color:white; font-size:40px; }

/* BEFORE AFTER */
.before-after {
padding:60px;
text-align:center;
}

.ba-slider {
position:relative;
width:90%;
max-width:700px;
margin:auto;
}

.ba-slider img {
width:100%;
}

.ba-overlay {
position:absolute;
top:0;
left:0;
width:50%;
overflow:hidden;
}

.ba-overlay img {
width:100%;
}

.ba-handle {
position:absolute;
top:0;
left:50%;
width:4px;
height:100%;
background:#25D366;
}

/* CONTACT */
.contact {
padding:60px;
text-align:center;
}

footer {
background:black;
color:white;
padding:20px;
text-align:center;
}
</style>
</head>

<body>

<header>
<div>PointCraft Interiors</div>
<nav>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Design Your Dream Space</h1>
</section>

<section class="before-after">
<h2>Before & After</h2>

<div class="ba-slider">
<img src="Before.png">
<div class="ba-overlay">
<img src="After.png">
</div>
<div class="ba-handle"></div>
</div>

</section>

<section class="contact">
<h2>Contact</h2>
<p>+91 9953251355</p>
</section>

<footer>
<p>PointCraft Interiors</p>
</footer>

<script>
const slider = document.querySelector(".ba-slider");
const overlay = document.querySelector(".ba-overlay");
const handle = document.querySelector(".ba-handle");

let isDragging = false;

handle.onmousedown = () => isDragging = true;
window.onmouseup = () => isDragging = false;

window.onmousemove = (e) => {
if (!isDragging) return;

let rect = slider.getBoundingClientRect();
let x = e.clientX - rect.left;

let percent = (x / rect.width) * 100;
overlay.style.width = percent + "%";
handle.style.left = percent + "%";
};
</script>

</body>
</html>
