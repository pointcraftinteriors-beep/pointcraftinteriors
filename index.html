<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body {margin:0;font-family:Arial;background:#f6f6f6;}

nav {
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:white;
}

nav ul {display:flex;gap:20px;list-style:none;}

.section {padding:50px;text-align:center;}

.cards {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card {
  width:220px;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.gallery {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.gallery img {
  width:300px;
  border-radius:10px;
}
</style>
</head>

<body>

<nav>
  <h2>PointCraft Interiors</h2>
  <ul>
    <li>Home</li>
    <li>Services</li>
    <li>Gallery</li>
  </ul>
</nav>

<div class="section">
<h2>Our Services</h2>

<div class="cards">

<div class="card">
<img src="https://picsum.photos/400?random=1">
<p>Modular Kitchen</p>
</div>

<div class="card">
<img src="https://picsum.photos/400?random=2">
<p>Wardrobe</p>
</div>

<div class="card">
<img src="https://picsum.photos/400?random=3">
<p>Full Interior</p>
</div>

<div class="card">
<img src="https://picsum.photos/400?random=4">
<p>Steel Work</p>
</div>

</div>
</div>

<div class="section">
<h2>Our Work</h2>

<div class="gallery">
<img src="https://picsum.photos/500?random=5">
<img src="https://picsum.photos/500?random=6">
<img src="https://picsum.photos/500?random=7">
</div>

</div>

</body>
</html>
