<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background: #000; /* BLACK HEADER */
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
}

/* LOGO SECTION */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 50px;
}

.logo h1 {
    color: #fff; /* WHITE TEXT */
    font-size: 22px;
    margin: 0;
}

.logo span {
    color: gold; /* CRAFT GOLD */
}

/* NAV */
nav a {
    color: #fff;
    text-decoration: none;
    margin-left: 25px;
    font-size: 16px;
}

/* HERO */
.hero {
    height: 400px;
    background: url("Hero.jpg") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero h2 {
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 15px 30px;
    border-radius: 10px;
}

/* SERVICES SECTION */
.services {
    background: #e6f4ff; /* LIGHT SKY BG */
    padding: 40px;
    text-align: center;
}

.services h2 {
    margin-bottom: 30px;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.card img {
    width: 200px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo1.png" alt="logo">
        <h1>Point<span>Craft</span> Interiors</h1>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Design Your Dream Space</h2>
</section>

<section class="services">
    <h2>Our Services</h2>

    <div class="cards">
        <div class="card">
            <img src="Kitchen.jpg">
        </div>

        <div class="card">
            <img src="Wardrobe.jpg">
        </div>

        <div class="card">
            <img src="Interior.jpg">
        </div>

        <div class="card">
            <img src="Railing.jpg">
        </div>
    </div>
</section>

</body>
</html>
