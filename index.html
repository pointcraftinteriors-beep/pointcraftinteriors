<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f6f6f6;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: white;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 20px;
}

/* HERO */
.hero {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1400&q=80') center/cover;
}

/* SECTION */
.section {
  padding: 50px 20px;
  text-align: center;
}

/* SERVICES */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 220px;
  border-radius: 10px;
  overflow: hidden;
  background: white;
}

.card img {
  width: 100%;
  height: 220px;   /* ✅ square feel */
  object-fit: cover;
}

.card p {
  margin: 10px 0;
  font-weight: bold;
}

/* GALLERY */
.gallery {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.gallery img {
  width: 300px;
  border-radius: 10px;
}
</style>
</head>

<body>

<nav>
  <h2>PointCraft Interiors</h2>
  <ul>
    <li>Home</li>
    <li>About</li>
    <li>Services</li>
    <li>Gallery</li>
    <li>Contact</li>
  </ul>
</nav>

<div class="hero"></div>

<div class="section">
  <h2>Our Services</h2>

  <div class="cards">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1556912167-f556f1f39a7d?auto=format&fit=crop&w=500&q=80">
      <p>Modular Kitchen</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1616627451515-cbc80e5ece35?auto=format&fit=crop&w=500&q=80">
      <p>Wardrobe</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600210492493-0946911123ea?auto=format&fit=crop&w=500&q=80">
      <p>Full Interior</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1581090700227-1e8e1b6a0d1b?auto=format&fit=crop&w=500&q=80">
      <p>Steel Work</p>
    </div>

  </div>
</div>

<div class="section">
  <h2>Our Work</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf?auto=format&fit=crop&w=600&q=80">
    <img src="https://images.unsplash.com/photo-1600210492493-0946911123ea?auto=format&fit=crop&w=600&q=80">
    <img src="https://images.unsplash.com/photo-1600607687644-aac4c3eac7f4?auto=format&fit=crop&w=600&q=80">
  </div>
</div>

<div class="section">
  <h2>Contact</h2>
  <p>Call / WhatsApp: +91 XXXXX XXXXX</p>
</div>

</body>
</html>
