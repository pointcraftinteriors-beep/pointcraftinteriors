<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body {
    margin:0;
    font-family: Arial;
}

/* HEADER */
header {
    background: linear-gradient(to right, #000, #111);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

.logo img {
    height:50px;
}

nav a {
    color:white;
    margin-left:25px;
    text-decoration:none;
}

/* HERO */
.hero {
    height:400px;
    background:url("Hero.jpg") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero h2 {
    background:rgba(0,0,0,0.6);
    color:white;
    padding:15px 30px;
    border-radius:10px;
}

/* BRAND STRIP */
.brand {
    text-align:center;
    background:black;
    color:white;
    padding:20px;
}

.brand span {
    color:gold;
}

/* SERVICES */
.services {
    background:#c9d7e1;
    padding:40px;
    text-align:center;
}

.cards {
    display:flex;
    justify-content:center;
    gap:20px;
}

.card {
    background:#fff;
    border-radius:12px;
    overflow:hidden;
}

.card img {
    width:250px;
}

.card p {
    padding:10px;
}

/* WORK */
.work {
    padding:50px;
    text-align:center;
    background:#f7f7f7;
}

.work-grid {
    display:flex;
    justify-content:center;
    gap:20px;
}

.work-grid img {
    width:300px;
    border-radius:12px;
}

/* BEFORE AFTER */
.before-after {
    padding:50px;
    text-align:center;
}

.ba-grid {
    display:flex;
    justify-content:center;
    gap:20px;
}

.ba-grid img {
    width:300px;
    border-radius:12px;
}

/* FOOTER */
footer {
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<header>
    <div class="logo">
        <img src="logo1.png">
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Design Your Dream Space</h2>
</section>

<section class="brand">
    <h2>Point<span>Craft</span> Interiors</h2>
    <p>9953251355 | pointcraftinteriors@gmail.com</p>
</section>

<section class="services">
    <h2>Our Services</h2>

    <div class="cards">
        <div class="card">
            <img src="Kitchen.jpg">
            <p>Modular Kitchen</p>
        </div>

        <div class="card">
            <img src="Wardrobe.jpg">
            <p>Wardrobe</p>
        </div>

        <div class="card">
            <img src="Interior.jpg">
            <p>Full Interior</p>
        </div>

        <div class="card">
            <img src="Railing.jpg">
            <p>Steel Work</p>
        </div>
    </div>
</section>

<section class="work">
    <h2>Our Work</h2>

    <div class="work-grid">
        <img src="Kitchen2.jpg">
        <img src="Wardrobe2.jpg">
        <img src="Interiors.jpg">
    </div>
</section>

<section class="before-after">
    <h2>Before & After</h2>

    <div class="ba-grid">
        <img src="Interior.jpg">
        <img src="Kitchen.jpg">
    </div>
</section>

<footer>
    © PointCraft Interiors | All Rights Reserved
</footer>

</body>
</html>
