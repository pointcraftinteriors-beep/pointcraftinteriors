<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointCraft Interiors</title>

<style>
body {
margin:0;
font-family: Arial;
background:#f5f5f5;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:20px 50px;
background:white;
}

nav h2{margin:0;}

nav ul{
list-style:none;
display:flex;
gap:20px;
}

nav a{
text-decoration:none;
color:black;
font-weight:500;
}

/* HERO (NEW THEME) */
.hero{
height:400px;
background:linear-gradient(to right, #fff9c4, #e3f2fd);
display:flex;
align-items:center;
justify-content:center;
color:#333;
text-align:center;
}

.hero h1{
font-size:42px;
background:white;
padding:12px 25px;
border-radius:8px;
}

/* SERVICES */
.services{
text-align:center;
padding:40px;
}

.cards{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
width:250px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:15px;
}

/* WORK */
.work{
text-align:center;
padding:40px;
}

.work img{
width:300px;
border-radius:10px;
margin:10px;
}

/* CONTACT */
.contact{
background:#222;
color:white;
text-align:center;
padding:30px;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav>
<h2>PointCraft Interiors</h2>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<!-- HERO -->

<div class="hero">
<h1>Design Your Dream Space</h1>
</div>

<!-- SERVICES -->

<div class="services">
<h2>Our Services</h2>

<div class="cards">
<div class="card">
<img src="Kitchen.jpg">
<h3>Modular Kitchen</h3>
</div>

<div class="card">
<img src="Wardrobe.jpg">
<h3>Wardrobe</h3>
</div>

<div class="card">
<img src="Interior.jpg">
<h3>Full Interior</h3>
</div>

<div class="card">
<img src="Railing.jpg">
<h3>Steel Work</h3>
</div>
</div>
</div>

<!-- WORK -->

<div class="work">
<h2>Our Work</h2>

<img src="Kitchen2.jpg">
<img src="Wardrobe2.jpg">
<img src="Interiors.jpg">

</div>

<!-- CONTACT -->

<div class="contact">
<h2>Contact Us</h2>
<p>Phone: 9876543210</p>
<p>Email: pointcraft@gmail.com</p>
</div>

</body>
</html>
