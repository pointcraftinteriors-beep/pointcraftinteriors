<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - PointCraft Interiors</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
}

/* HEADER */
header {
    background: linear-gradient(to right, #000000, #1a1a1a);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 45px;
}

.logo-text {
    font-size: 20px;
    font-weight: bold;
}

.logo-text span {
    color: gold;
}

nav a {
    color: white;
    margin-left: 25px;
    text-decoration: none;
}

/* CONTACT */
.contact {
    padding: 60px;
    text-align: center;
    background: #f5f1e8;
}

.contact h2 {
    font-size: 32px;
    margin-bottom: 20px;
}

.contact-box {
    max-width: 600px;
    margin: auto;
    text-align: left;
}

.contact-box input,
.contact-box textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.contact-box button {
    background: black;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* WHATSAPP BUTTON */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.whatsapp a {
    background: #25D366;
    color: white;
    padding: 12px 18px;
    border-radius: 50px;
    text-decoration: none;
}

/* FOOTER */
footer {
    background: black;
    color: white;
    text-align: center;
    padding: 30px;
}
</style>

</head>

<body>

<header>
    <div class="logo">
        <img src="logo1.png">
        <div class="logo-text">
            Point<span>Craft</span> Interiors
        </div>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="contact">
    <h2>Contact Us</h2>

    <div class="contact-box">
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea rows="5" placeholder="Your Message"></textarea>
        <button>Send Message</button>
    </div>
</section>

<!-- WhatsApp -->
<div class="whatsapp">
    <a href="https://wa.me/919953251355" target="_blank">Chat on WhatsApp</a>
</div>

<footer>
    <p>📞 9953251355</p>
    <p>📧 pointcraftinteriors@gmail.com</p>
</footer>

</body>
</html>
