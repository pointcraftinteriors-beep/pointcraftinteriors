<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - PointCraft Interiors</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f5f1e8;
}

/* HEADER */
header{
background:black;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{height:40px}
.logo span{color:gold}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

/* SECTION */
.gallery{
padding:80px 60px;
text-align:center;
}

.gallery h1{
font-size:34px;
margin-bottom:10px;
}

.gallery p{
color:gray;
margin-bottom:50px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

/* CARD */
.item{
height:250px;
border-radius:15px;
overflow:hidden;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.item img{
width:100%;
height:100%;
object-fit:cover;
transition:0.5s;
}

.item:hover img{
transform:scale(1.1);
}

.item:hover{
transform:translateY(-5px);
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
width:85%;
height:70%;
background:white;
display:flex;
border-radius:10px;
overflow:hidden;
}

/* IMAGE SIDE */
.popup-img{
width:60%;
}

.popup-img img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT SIDE */
.popup-content{
width:40%;
padding:30px;
display:flex;
flex-direction:column;
justify-content:center;
}

.popup-content h2{
margin-bottom:10px;
}

.popup-content p{
font-size:15px;
line-height:1.6;
}

/* BUTTON */
.btn{
margin-top:20px;
background:#25D366;
color:white;
padding:12px;
text-align:center;
border-radius:6px;
text-decoration:none;
}

/* CLOSE */
.close{
position:absolute;
top:20px;
right:30px;
font-size:35px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo1.png">
<div>Point<span>Craft</span> Interiors</div>
</div>

<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="gallery">
<h1>Our Work Gallery</h1>
<p>Explore our premium interior projects crafted with modern design and quality finish.</p>

<div class="grid">

<div class="item" onclick="openPopup('Kitchen.jpg','Modular Kitchen','Premium modular kitchen with smart storage and modern finish.')">
<img src="Kitchen.jpg">
</div>

<div class="item" onclick="openPopup('Kitchen2.jpg','Modern Kitchen','Stylish kitchen with elegant design and space optimization.')">
<img src="Kitchen2.jpg">
</div>

<div class="item" onclick="openPopup('Wardrobe.jpg','Luxury Wardrobe','Modern wardrobe with sliding doors and premium finish.')">
<img src="Wardrobe.jpg">
</div>

<div class="item" onclick="openPopup('Wardrobe2.jpg','Custom Wardrobe','Customized wardrobe designed for maximum storage and aesthetics.')">
<img src="Wardrobe2.jpg">
</div>

<div class="item" onclick="openPopup('Interior.jpg','Living Room','Modern living room interior with comfort and style.')">
<img src="Interior.jpg">
</div>

<div class="item" onclick="openPopup('Interiors.jpg','Full Interior','Complete home interior solutions with premium quality.')">
<img src="Interiors.jpg">
</div>

<div class="item" onclick="openPopup('Railing.jpg','Steel Work','Strong and stylish steel railing for modern homes.')">
<img src="Railing.jpg">
</div>

<div class="item" onclick="openPopup('Kitchen.jpg','Interior Design','Premium interior work with modern finish and design.')">
<img src="Kitchen.jpg">
</div>

</div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="close" onclick="closePopup()">×</div>

<div class="popup-box">

<div class="popup-img">
<img id="popup-img">
</div>

<div class="popup-content">
<h2 id="popup-title"></h2>
<p id="popup-text"></p>

<a class="btn" href="https://wa.me/919953251355">Enquire on WhatsApp</a>
</div>

</div>
</div>

<script>
function openPopup(img,title,text){
document.getElementById("popup").style.display="flex";
document.getElementById("popup-img").src=img;
document.getElementById("popup-title").innerText=title;
document.getElementById("popup-text").innerText=text;
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
