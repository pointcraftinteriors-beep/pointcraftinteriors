<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<style>
body{margin:0;font-family:sans-serif}

/* HEADER */
header{background:black;color:white;display:flex;justify-content:space-between;padding:15px 40px}
.logo span{color:gold}
nav a{color:white;margin-left:20px;text-decoration:none}

/* GALLERY */
.gallery{padding:60px;text-align:center;background:#f5f1e8}
.grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}

/* CARD */
.item{
width:300px;height:200px;
position:relative;overflow:hidden;
border-radius:12px;cursor:pointer;
}

.item img{
width:100%;height:100%;
object-fit:cover;
transition:0.4s;
}

/* HOVER */
.item:hover img{transform:scale(1.1)}

.overlay{
position:absolute;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
color:white;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:0.3s;
font-weight:bold;
}

.item:hover .overlay{opacity:1}

/* LIGHTBOX */
#lightbox{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;
padding:15px;border-radius:50%;
font-size:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">Point<span>Craft</span> Interiors</div>
<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="gallery">
<h1>Our Work Gallery</h1>

<div class="grid">

<div class="item" onclick="openImg('Kitchen.jpg')">
<img src="Kitchen.jpg">
<div class="overlay">Kitchen</div>
</div>

<div class="item" onclick="openImg('Kitchen2.jpg')">
<img src="Kitchen2.jpg">
<div class="overlay">Modern Kitchen</div>
</div>

<div class="item" onclick="openImg('Wardrobe.jpg')">
<img src="Wardrobe.jpg">
<div class="overlay">Wardrobe</div>
</div>

<div class="item" onclick="openImg('Wardrobe2.jpg')">
<img src="Wardrobe2.jpg">
<div class="overlay">Luxury Wardrobe</div>
</div>

<div class="item" onclick="openImg('Interior.jpg')">
<img src="Interior.jpg">
<div class="overlay">Living Room</div>
</div>

<div class="item" onclick="openImg('Interiors.jpg')">
<img src="Interiors.jpg">
<div class="overlay">Interior</div>
</div>

<div class="item" onclick="openImg('Railing.jpg')">
<img src="Railing.jpg">
<div class="overlay">Steel Work</div>
</div>

</div>
</section>

<div id="lightbox" onclick="closeImg()">
<img id="imgbox">
</div>

<div class="whatsapp">💬</div>

<script>
function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("imgbox").src=src;
}
function closeImg(){
document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
