<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>

<style>
body{margin:0;font-family:sans-serif}

/* HEADER */
header{
background:black;color:white;
display:flex;justify-content:space-between;
padding:15px 40px;
}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:40px}
.logo span{color:gold}
nav a{color:white;margin-left:20px;text-decoration:none}

/* GALLERY */
.gallery{padding:60px;background:#f5f1e8;text-align:center}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.item{height:220px;overflow:hidden;border-radius:12px;cursor:pointer}
.item img{width:100%;height:100%;object-fit:cover}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:white;
width:80%;
height:70%;
display:flex;
border-radius:10px;
overflow:hidden;
}

/* LEFT IMAGE */
.popup-img{
width:60%;
}
.popup-img img{
width:100%;
height:100%;
object-fit:cover;
}

/* RIGHT TEXT */
.popup-content{
width:40%;
padding:30px;
display:flex;
flex-direction:column;
justify-content:center;
}

.popup-content h2{
margin-bottom:10px;
}

.popup-content p{
font-size:14px;
line-height:1.6;
}

/* BUTTON */
.btn{
margin-top:20px;
background:#25D366;
color:white;
padding:10px;
text-align:center;
border-radius:6px;
text-decoration:none;
}

/* CLOSE */
.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo1.png">
<div>Point<span>Craft</span> Interiors</div>
</div>

<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="gallery">
<h1>Our Work Gallery</h1>

<div class="grid">

<div class="item" onclick="openPopup('Kitchen.jpg','Modular Kitchen','We create premium modular kitchens with smart storage and modern finish.')">
<img src="Kitchen.jpg">
</div>

<div class="item" onclick="openPopup('Wardrobe.jpg','Wardrobe Design','Luxury wardrobes with modern sliding and space optimization.')">
<img src="Wardrobe.jpg">
</div>

<div class="item" onclick="openPopup('Interior.jpg','Full Interior','Complete home interior solutions with premium quality.')">
<img src="Interior.jpg">
</div>

<div class="item" onclick="openPopup('Railing.jpg','Steel Work','Strong and stylish steel work for modern homes.')">
<img src="Railing.jpg">
</div>

</div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="close" onclick="closePopup()">×</div>

<div class="popup-box">

<div class="popup-img">
<img id="popup-img">
</div>

<div class="popup-content">
<h2 id="popup-title"></h2>
<p id="popup-text"></p>

<a class="btn" href="https://wa.me/919953251355">Enquire on WhatsApp</a>
</div>

</div>
</div>

<script>
function openPopup(img,title,text){
document.getElementById("popup").style.display="flex";
document.getElementById("popup-img").src=img;
document.getElementById("popup-title").innerText=title;
document.getElementById("popup-text").innerText=text;
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
