<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - PointCraft Interiors</title>

<style>
body { margin:0; font-family:'Segoe UI'; }

/* HEADER SAME */
header {
background:black;color:white;
display:flex;justify-content:space-between;
align-items:center;padding:15px 40px;
}
.logo { display:flex;align-items:center;gap:10px; }
.logo img { height:40px; }
.logo-text span { color:gold; }
nav a { color:white;margin-left:20px;text-decoration:none; }

/* GALLERY */
.gallery {
padding:60px;
text-align:center;
background:#f5f1e8;
}

.gallery-grid {
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

/* CARD */
.gallery-item {
position:relative;
width:300px;
height:200px;
overflow:hidden;
border-radius:12px;
cursor:pointer;
}

.gallery-item img {
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

/* HOVER EFFECT */
.gallery-item:hover img {
transform:scale(1.1);
}

.overlay {
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
opacity:0;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:18px;
font-weight:bold;
transition:0.3s;
}

.gallery-item:hover .overlay {
opacity:1;
}

/* LIGHTBOX */
#lightbox {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

#lightbox img {
max-width:90%;
max-height:90%;
}

/* WHATSAPP FLOAT */
.whatsapp-float {
position:fixed;
bottom:20px;
right:20px;
}
.whatsapp-float a {
background:#25D366;
color:white;
font-size:26px;
padding:15px 18px;
border-radius:50%;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
<div class="logo-text">Point<span>Craft</span> Interiors</div>
</div>

<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="gallery">
<h1>Our Work Gallery</h1>

<div class="gallery-grid">

<div class="gallery-item" onclick="openImage('Kitchen.jpg')">
<img src="Kitchen.jpg">
<div class="overlay">Modular Kitchen</div>
</div>

<div class="gallery-item" onclick="openImage('Kitchen2.jpg')">
<img src="Kitchen2.jpg">
<div class="overlay">Modern Kitchen</div>
</div>

<div class="gallery-item" onclick="openImage('Wardrobe.jpg')">
<img src="Wardrobe.jpg">
<div class="overlay">Wardrobe Design</div>
</div>

<div class="gallery-item" onclick="openImage('Wardrobe2.jpg')">
<img src="Wardrobe2.jpg">
<div class="overlay">Luxury Wardrobe</div>
</div>

<div class="gallery-item" onclick="openImage('Interior.jpg')">
<img src="Interior.jpg">
<div class="overlay">Living Room</div>
</div>

<div class="gallery-item" onclick="openImage('Interiors.jpg')">
<img src="Interiors.jpg">
<div class="overlay">Interior Design</div>
</div>

<div class="gallery-item" onclick="openImage('Railing.jpg')">
<img src="Railing.jpg">
<div class="overlay">Steel Work</div>
</div>

</div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<!-- FLOAT -->
<div class="whatsapp-float">
<a href="https://wa.me/919953251355">💬</a>
</div>

<script>
function openImage(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;
}
function closeImage(){
document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
